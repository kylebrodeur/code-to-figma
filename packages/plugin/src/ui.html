<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1a1510;--sf:#231c14;--sf2:#2c2418;--br:#3a3020;--brh:#4e4030;--tx:#e8dfd0;--mu:#907e68;--dm:#7a6a58;--go:#c98d1a;--ru:#cc6030;--te:#5a9e80;--go-dim:rgba(201,141,26,.10);--ru-dim:rgba(204,96,48,.10)}
body{background:var(--bg);color:var(--tx);font-family:'Martian Mono',monospace;font-size:11px;line-height:1.5;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.header{padding:12px 14px 10px;border-bottom:1px solid var(--br)}
.header-top{display:flex;align-items:baseline;gap:8px;margin-bottom:3px}
.header h1{font-family:'Martian Mono',monospace;font-size:12px;font-weight:500;letter-spacing:.06em;color:var(--tx)}
.header-slash{color:var(--dm);font-size:11px}
.header-sub{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--dm)}
.header p{font-size:10px;color:var(--mu);margin-top:2px;letter-spacing:.04em}
.content{flex:1;padding:12px 14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto}
.field-label{font-size:9px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--dm);margin-bottom:4px}
textarea{width:100%;flex:1;min-height:110px;padding:10px;background:var(--sf);border:1px solid var(--br);border-radius:2px;color:var(--tx);font-family:'Martian Mono',monospace;font-size:10px;line-height:1.5;resize:none;transition:border-color .12s}
textarea:focus{outline:none;border-color:var(--brh)}
textarea::placeholder{color:var(--dm)}
.file-row{display:flex;gap:8px;align-items:center}
.file-name{font-size:10px;color:var(--dm);letter-spacing:.04em;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.preview{background:var(--sf);border:1px solid var(--br);border-radius:2px;min-height:32px;max-height:90px;overflow-y:auto}
.preview-empty{padding:9px 10px;font-size:10px;color:var(--dm);letter-spacing:.04em}
.comp-row{display:flex;align-items:center;gap:6px;padding:6px 10px;border-bottom:1px solid var(--br)}
.comp-row:last-child{border-bottom:none}
.comp-name{flex:1;font-size:10px;color:var(--tx);letter-spacing:.04em}
.comp-badge{font-size:9px;letter-spacing:.07em;text-transform:uppercase;color:var(--go);background:var(--go-dim);border:1px solid rgba(201,141,26,.22);border-radius:2px;padding:1px 5px}
.comp-badge.single{color:var(--mu);background:transparent;border-color:var(--brh)}
.comp-count{font-size:9px;color:var(--dm);letter-spacing:.06em}
.actions{display:flex;gap:5px;padding:10px 14px;border-top:1px solid var(--br);background:var(--sf)}
.btn{font-family:'Martian Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;border:1px solid;border-radius:2px;cursor:pointer;padding:0 12px;height:32px;transition:all .12s;display:inline-flex;align-items:center;justify-content:center;gap:5px}
.btn:disabled{opacity:.4;pointer-events:none}
.btn-primary{background:var(--go);color:var(--bg);border-color:var(--go);flex:2}.btn-primary:hover{filter:brightness(1.12)}
.btn-ghost{background:transparent;color:var(--mu);border-color:var(--brh);flex:1}.btn-ghost:hover{background:var(--sf2);color:var(--tx)}
.btn-danger{background:transparent;color:var(--ru);border-color:var(--ru);flex:1}.btn-danger:hover{background:var(--ru-dim)}
.statusbar{padding:8px 14px;font-size:9px;letter-spacing:.06em;color:var(--dm);border-top:1px solid var(--br);display:flex;align-items:center;gap:8px;min-height:34px}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:var(--brh)}
.dot.ok{background:var(--te)}.dot.err{background:var(--ru)}.dot.busy{background:var(--go);animation:pulse .7s infinite alternate}
@keyframes pulse{from{opacity:.3}to{opacity:1}}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>code-to-figma</h1>
    <span class="header-slash">//</span>
    <span class="header-sub">plugin</span>
  </div>
  <p>Paste CLI output to render components in Figma</p>
</div>

<div class="content">
  <div class="field-label">Component JSON</div>
  <textarea id="json-input" placeholder="Paste .figma.json or plugin-data.json here...

[ { &quot;name&quot;: &quot;Button&quot;, &quot;type&quot;: &quot;COMPONENT_SET&quot;, ... } ]

Accepts a single object or an array."></textarea>

  <div class="file-row">
    <button class="btn btn-ghost" id="btn-file" onclick="pickFile()">Load file</button>
    <span class="file-name" id="file-name">No file selected</span>
  </div>

  <div class="field-label">Components found</div>
  <div class="preview" id="preview">
    <div class="preview-empty">No JSON loaded</div>
  </div>
</div>

<div class="actions">
  <button class="btn btn-primary" id="btn-build" onclick="buildAll()" disabled>Build selected</button>
  <button class="btn btn-danger" id="btn-remove" onclick="removeAll()">Remove all</button>
</div>

<div class="statusbar">
  <div class="dot" id="dot"></div>
  <span id="status">Ready</span>
</div>

<input type="file" id="file-picker" accept=".json" style="display:none" onchange="handleFile(event)">

<script>
var parsedData = null;

function pickFile() {
  document.getElementById('file-picker').click();
}

function handleFile(e) {
  var file = e.target.files[0];
  if (!file) return;
  document.getElementById('file-name').textContent = file.name;
  var reader = new FileReader();
  reader.onload = function(ev) {
    document.getElementById('json-input').value = ev.target.result;
    parseJSON();
  };
  reader.readAsText(file);
}

function parseJSON() {
  var raw = document.getElementById('json-input').value.trim();
  if (!raw) { parsedData = null; updatePreview(); return; }
  try {
    var data = JSON.parse(raw);
    if (!Array.isArray(data)) data = [data];
    for (var i = 0; i < data.length; i++) {
      if (!data[i].name || !data[i].type) throw new Error('Item ' + i + ' missing name or type');
    }
    parsedData = data;
    updatePreview();
  } catch (err) {
    parsedData = null;
    updatePreview();
    setStatus('Parse error: ' + err.message, 'err');
  }
}

function updatePreview() {
  var el = document.getElementById('preview');
  var btn = document.getElementById('btn-build');
  if (!parsedData || parsedData.length === 0) {
    el.innerHTML = '<div class="preview-empty">No JSON loaded</div>';
    btn.disabled = true;
    return;
  }
  var html = '';
  for (var i = 0; i < parsedData.length; i++) {
    var c = parsedData[i];
    var variantCount = c.variants ? c.variants.length : 0;
    var isSet = c.type === 'COMPONENT_SET';
    html += '<div class="comp-row">';
    html += '<span class="comp-name">' + escapeHtml(c.name) + '</span>';
    html += '<span class="comp-count">' + variantCount + 'v</span>';
    html += '<span class="comp-badge' + (isSet ? '' : ' single') + '">' + escapeHtml(c.type) + '</span>';
    html += '</div>';
  }
  el.innerHTML = html;
  btn.disabled = false;
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

function buildAll() {
  if (!parsedData) { setStatus('No JSON loaded', 'err'); return; }
  setBusy(true);
  setStatus('Building ' + parsedData.length + ' component(s)...', 'busy');
  parent.postMessage({ pluginMessage: { type: 'IMPORT_JSON', data: parsedData } }, '*');
}

function removeAll() {
  setBusy(true);
  setStatus('Removing...', 'busy');
  parent.postMessage({ pluginMessage: { type: 'REMOVE_ALL' } }, '*');
}

function setStatus(msg, state) {
  var dot = document.getElementById('dot');
  var txt = document.getElementById('status');
  dot.className = 'dot' + (state === 'ok' ? ' ok' : state === 'err' ? ' err' : state === 'busy' ? ' busy' : '');
  txt.textContent = msg;
  txt.style.color = state === 'err' ? 'var(--ru)' : state === 'ok' ? 'var(--te)' : 'var(--dm)';
}

function setBusy(b) {
  document.getElementById('btn-build').disabled = b;
  document.getElementById('btn-remove').disabled = b;
}

document.getElementById('json-input').addEventListener('input', parseJSON);

window.onmessage = function(e) {
  var msg = e.data.pluginMessage;
  if (!msg) return;
  setBusy(false);
  if (msg.type === 'STATUS') { setStatus(msg.msg, 'busy'); setBusy(true); }
  else if (msg.type === 'DONE') { setStatus(msg.msg, 'ok'); }
  else if (msg.type === 'ERROR') { setStatus('Error: ' + msg.msg, 'err'); }
};
</script>
</body>
</html>
