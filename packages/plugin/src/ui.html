<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1a1510;--sf:#231c14;--sf2:#2c2418;--br:#3a3020;--brh:#4e4030;--tx:#e8dfd0;--mu:#907e68;--dm:#7a6a58;--go:#c98d1a;--ru:#cc6030;--te:#5a9e80;--go-dim:rgba(201,141,26,.10);--ru-dim:rgba(204,96,48,.10)}
body{background:var(--bg);color:var(--tx);font-family:'Martian Mono',monospace;font-size:11px;line-height:1.5;display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── header ── */
.header{padding:12px 14px 10px;border-bottom:1px solid var(--br);flex-shrink:0}
.header-top{display:flex;align-items:baseline;gap:8px;margin-bottom:3px}
.header h1{font-size:12px;font-weight:500;letter-spacing:.06em;color:var(--tx)}
.header-slash{color:var(--dm);font-size:11px}
.header-sub{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--dm)}
.header p{font-size:10px;color:var(--mu);margin-top:2px;letter-spacing:.04em}

/* ── import panel ── */
.import-panel{padding:10px 14px;border-bottom:1px solid var(--br);flex-shrink:0}
.import-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.import-toggle{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--dm);cursor:pointer;display:flex;align-items:center;gap:5px;user-select:none}
.import-toggle:hover{color:var(--mu)}
.import-toggle .arrow{font-size:8px;transition:transform .15s}
.import-toggle.open .arrow{transform:rotate(90deg)}
.import-body{display:none}
.import-body.open{display:flex;flex-direction:column;gap:8px}
textarea{width:100%;min-height:90px;padding:9px 10px;background:var(--sf);border:1px solid var(--br);border-radius:2px;color:var(--tx);font-family:'Martian Mono',monospace;font-size:10px;line-height:1.5;resize:none;transition:border-color .12s}
textarea:focus{outline:none;border-color:var(--brh)}
textarea::placeholder{color:var(--dm)}
.file-row{display:flex;gap:8px;align-items:center}
.file-name{font-size:10px;color:var(--dm);letter-spacing:.04em;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── component list ── */
.list-wrap{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.sel-all{display:flex;align-items:center;gap:7px;padding:7px 14px;border-bottom:1px solid var(--br);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--dm);cursor:pointer;flex-shrink:0}
.sel-all:hover{color:var(--mu)}
.sel-all input{accent-color:var(--go);width:12px;height:12px;flex-shrink:0;cursor:pointer}
.empty-state{padding:20px 14px;font-size:10px;color:var(--dm);letter-spacing:.04em;text-align:center}
.comp-row{display:flex;align-items:center;gap:6px;padding:6px 14px;border-bottom:1px solid var(--br)}
.comp-row:last-child{border-bottom:none}
.comp-label{flex:1;display:flex;align-items:center;gap:7px;font-size:10px;color:var(--tx);cursor:pointer;letter-spacing:.04em}
.comp-label input[type=checkbox]{accent-color:var(--go);width:12px;height:12px;flex-shrink:0;cursor:pointer}
.comp-meta{display:flex;align-items:center;gap:5px;flex-shrink:0}
.num-tag{font-size:9px;color:var(--dm);letter-spacing:.06em}
.badge{font-size:9px;letter-spacing:.07em;text-transform:uppercase;border-radius:2px;padding:1px 5px;border:1px solid}
.badge-set{color:var(--go);background:var(--go-dim);border-color:rgba(201,141,26,.22)}
.badge-single{color:var(--mu);background:transparent;border-color:var(--brh)}
.row-actions{display:flex;gap:3px;flex-shrink:0}
.ibtn{font-family:'Martian Mono',monospace;font-size:8px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;border:1px solid var(--brh);border-radius:2px;cursor:pointer;padding:3px 6px;min-height:22px;background:transparent;color:var(--mu);transition:all .12s;display:inline-flex;align-items:center}
.ibtn:hover{background:var(--sf2);color:var(--tx)}
.ibtn.del:hover{border-color:var(--ru);color:var(--ru);background:var(--ru-dim)}
.ibtn.bld:hover{border-color:var(--go);color:var(--go);background:var(--go-dim)}
.ibtn:disabled{opacity:.4;pointer-events:none}

/* ── action bar ── */
.actions{display:flex;gap:5px;padding:10px 14px;border-top:1px solid var(--br);background:var(--sf);flex-shrink:0}
.btn{font-family:'Martian Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;border:1px solid;border-radius:2px;cursor:pointer;padding:0 12px;height:32px;transition:all .12s;display:inline-flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap}
.btn:disabled{opacity:.4;pointer-events:none}
.btn-primary{background:var(--go);color:var(--bg);border-color:var(--go);flex:2}.btn-primary:hover{filter:brightness(1.12)}
.btn-ghost{background:transparent;color:var(--mu);border-color:var(--brh);flex:1}.btn-ghost:hover{background:var(--sf2);color:var(--tx)}
.btn-danger{background:transparent;color:var(--ru);border-color:var(--ru);flex:1}.btn-danger:hover{background:var(--ru-dim)}

/* ── status bar ── */
.statusbar{padding:8px 14px;font-size:9px;letter-spacing:.06em;color:var(--dm);border-top:1px solid var(--br);display:flex;align-items:center;gap:8px;min-height:34px;flex-shrink:0}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:var(--brh)}
.dot.ok{background:var(--te)}.dot.err{background:var(--ru)}.dot.busy{background:var(--go);animation:pulse .7s infinite alternate}
@keyframes pulse{from{opacity:.3}to{opacity:1}}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>code-to-figma</h1>
    <span class="header-slash">//</span>
    <span class="header-sub">plugin</span>
  </div>
  <p>Render React components from CLI JSON into Figma</p>
</div>

<!-- collapsible import panel -->
<div class="import-panel">
  <div class="import-top">
    <div class="import-toggle" id="import-toggle" onclick="toggleImport()">
      <span class="arrow">▶</span>
      <span>Import JSON</span>
    </div>
    <button class="btn btn-ghost" style="flex:none;height:24px;font-size:8px;padding:0 8px" onclick="pickFile()">Load file</button>
    <span class="file-name" id="file-name">No file selected</span>
  </div>
  <div class="import-body" id="import-body">
    <textarea id="json-input" placeholder="Paste .figma.json or plugin-data.json here...

[ { &quot;name&quot;: &quot;Button&quot;, &quot;type&quot;: &quot;COMPONENT_SET&quot;, ... } ]"></textarea>
  </div>
</div>

<!-- component list -->
<div class="list-wrap">
  <div class="sel-all" id="sel-all-row" style="display:none">
    <input type="checkbox" id="cb-all" onchange="toggleAll(this.checked)">
    <span onclick="toggleAllClick()">Select all</span>
  </div>
  <div id="comp-list">
    <div class="empty-state">Load JSON to see components</div>
  </div>
</div>

<div class="actions">
  <button class="btn btn-primary" id="btn-build" onclick="buildSelected()" disabled>Build selected</button>
  <button class="btn btn-ghost" id="btn-update" onclick="buildSelected()" disabled>Update</button>
  <button class="btn btn-danger" id="btn-remove" onclick="removeSelected()" disabled>Remove</button>
</div>

<div class="statusbar">
  <div class="dot" id="dot"></div>
  <span id="status">Ready</span>
</div>

<input type="file" id="file-picker" accept=".json" style="display:none" onchange="handleFile(event)">

<script>
var parsedData = null;
var importOpen = false;

/* ── import panel ── */
function toggleImport() {
  importOpen = !importOpen;
  document.getElementById('import-toggle').classList.toggle('open', importOpen);
  document.getElementById('import-body').classList.toggle('open', importOpen);
}

function pickFile() {
  document.getElementById('file-picker').click();
}

function handleFile(e) {
  var file = e.target.files[0];
  if (!file) return;
  document.getElementById('file-name').textContent = file.name;
  var reader = new FileReader();
  reader.onload = function(ev) {
    if (!importOpen) toggleImport();
    document.getElementById('json-input').value = ev.target.result;
    parseJSON();
  };
  reader.readAsText(file);
}

function parseJSON() {
  var raw = document.getElementById('json-input').value.trim();
  if (!raw) { parsedData = null; renderList(); return; }
  try {
    var data = JSON.parse(raw);
    if (!Array.isArray(data)) data = [data];
    for (var i = 0; i < data.length; i++) {
      if (!data[i].name || !data[i].type) throw new Error('Item ' + i + ' missing name or type');
    }
    parsedData = data;
    renderList();
    setStatus(data.length + ' component(s) loaded', 'ok');
  } catch (err) {
    parsedData = null;
    renderList();
    setStatus('Parse error: ' + err.message, 'err');
  }
}

/* ── component list ── */
function renderList() {
  var list = document.getElementById('comp-list');
  var selRow = document.getElementById('sel-all-row');

  if (!parsedData || parsedData.length === 0) {
    list.innerHTML = '<div class="empty-state">Load JSON to see components</div>';
    selRow.style.display = 'none';
    syncActions();
    return;
  }

  selRow.style.display = 'flex';
  var html = '';
  for (var i = 0; i < parsedData.length; i++) {
    var c = parsedData[i];
    var variantCount = c.variants ? c.variants.length : 0;
    var isSet = c.type === 'COMPONENT_SET';
    var idx = i;
    html += '<div class="comp-row">';
    html += '<label class="comp-label"><input type="checkbox" class="comp-cb" value="' + idx + '" onchange="syncActions()">' + escapeHtml(c.name) + '</label>';
    html += '<div class="comp-meta">';
    html += '<span class="num-tag">' + variantCount + 'v</span>';
    html += '<span class="badge ' + (isSet ? 'badge-set' : 'badge-single') + '">' + (isSet ? 'set' : 'cmp') + '</span>';
    html += '</div>';
    html += '<div class="row-actions">';
    html += '<button class="ibtn bld" onclick="buildOne(' + idx + ')">Build</button>';
    html += '<button class="ibtn del" onclick="removeOne(' + idx + ')">X</button>';
    html += '</div>';
    html += '</div>';
  }
  list.innerHTML = html;
  syncActions();
}

function getSelectedIndices() {
  var cbs = document.querySelectorAll('.comp-cb:checked');
  var indices = [];
  for (var i = 0; i < cbs.length; i++) indices.push(parseInt(cbs[i].value));
  return indices;
}

function syncActions() {
  var sel = getSelectedIndices();
  var hasSel = sel.length > 0;
  document.getElementById('btn-build').disabled = !hasSel;
  document.getElementById('btn-update').disabled = !hasSel;
  document.getElementById('btn-remove').disabled = !hasSel;

  // sync select-all checkbox state
  var allCbs = document.querySelectorAll('.comp-cb');
  var cbAll = document.getElementById('cb-all');
  if (allCbs.length > 0 && cbAll) {
    cbAll.indeterminate = hasSel && sel.length < allCbs.length;
    cbAll.checked = hasSel && sel.length === allCbs.length;
  }
}

function toggleAll(checked) {
  document.querySelectorAll('.comp-cb').forEach(function(cb) { cb.checked = checked; });
  syncActions();
}

function toggleAllClick() {
  var cbAll = document.getElementById('cb-all');
  cbAll.checked = !cbAll.checked;
  toggleAll(cbAll.checked);
}

/* ── build / remove ── */
function getDataForIndices(indices) {
  var out = [];
  for (var i = 0; i < indices.length; i++) out.push(parsedData[indices[i]]);
  return out;
}

function buildSelected() {
  var sel = getSelectedIndices();
  if (!sel.length) { setStatus('Select at least one component', 'err'); return; }
  var data = getDataForIndices(sel);
  setBusy(true);
  setStatus('Building ' + data.length + ' component(s)...', 'busy');
  parent.postMessage({ pluginMessage: { type: 'IMPORT_JSON', data: data } }, '*');
}

function removeSelected() {
  var sel = getSelectedIndices();
  if (!sel.length) { setStatus('Select components to remove', 'err'); return; }
  setBusy(true);
  setStatus('Removing...', 'busy');
  var names = getDataForIndices(sel).map(function(c) { return c.name; });
  parent.postMessage({ pluginMessage: { type: 'REMOVE_COMPONENTS', names: names } }, '*');
}

function buildOne(idx) {
  if (!parsedData || !parsedData[idx]) return;
  setBusy(true);
  setStatus('Building ' + parsedData[idx].name + '...', 'busy');
  parent.postMessage({ pluginMessage: { type: 'IMPORT_JSON', data: [parsedData[idx]] } }, '*');
}

function removeOne(idx) {
  if (!parsedData || !parsedData[idx]) return;
  setBusy(true);
  setStatus('Removing ' + parsedData[idx].name + '...', 'busy');
  parent.postMessage({ pluginMessage: { type: 'REMOVE_COMPONENTS', names: [parsedData[idx].name] } }, '*');
}

/* ── utils ── */
function escapeHtml(str) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

function setStatus(msg, state) {
  var dot = document.getElementById('dot');
  var txt = document.getElementById('status');
  dot.className = 'dot' + (state === 'ok' ? ' ok' : state === 'err' ? ' err' : state === 'busy' ? ' busy' : '');
  txt.textContent = msg;
  txt.style.color = state === 'err' ? 'var(--ru)' : state === 'ok' ? 'var(--te)' : 'var(--dm)';
}

function setBusy(b) {
  ['btn-build','btn-update','btn-remove'].forEach(function(id) {
    document.getElementById(id).disabled = b;
  });
  document.querySelectorAll('.ibtn').forEach(function(btn) { btn.disabled = b; });
}

document.getElementById('json-input').addEventListener('input', parseJSON);

window.onmessage = function(e) {
  var msg = e.data.pluginMessage;
  if (!msg) return;
  // Re-enable row buttons manually since setBusy disabled them
  document.querySelectorAll('.ibtn').forEach(function(btn) { btn.disabled = false; });
  if (msg.type === 'STATUS') { setStatus(msg.msg, 'busy'); setBusy(true); }
  else if (msg.type === 'DONE') { setStatus(msg.msg, 'ok'); syncActions(); }
  else if (msg.type === 'ERROR') { setStatus('Error: ' + msg.msg, 'err'); syncActions(); }
};
</script>
</body>
</html>
